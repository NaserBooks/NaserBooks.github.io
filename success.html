<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شكراً لشرائك</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#fff;
padding:40px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.15);
text-align:center;
max-width:500px;
width:90%;
}

h1{
color:#16a34a;
margin-bottom:15px;
}

p{
font-size:18px;
line-height:1.8;
color:#444;
}

.btn{
display:inline-block;
margin-top:25px;
padding:16px 35px;
background:#16a34a;
color:#fff;
text-decoration:none;
border-radius:10px;
font-size:20px;
font-weight:bold;
transition:.3s;
}

.btn:hover{
background:#15803d;
}

.note{
margin-top:20px;
font-size:15px;
color:#777;
}
</style>

</head>

<body>

<div class="box">

<h1>🎉 شكراً لشرائك الكتاب</h1>

<p>
تمت عملية الشراء بنجاح.
</p>

<p>
اضغط على الزر التالي لتحميل الكتاب.
</p>

<a class="btn"
href="https://drive.google.com/uc?export=download&id=1DkyuZEnIcGn8hCjbFfZZgjHmpo-9296-">

📥 تحميل الكتاب الآن

</a>

<div class="note">
إذا لم يبدأ التحميل مباشرة، اضغط الزر مرة أخرى.
</div>

</div>

</body>
</html>
