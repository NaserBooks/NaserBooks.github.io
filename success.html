<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>شكراً لشرائك</title>

<style>

body{
margin:0;
background:#f5f5f5;
font-family:Tahoma,Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
text-align:center;
max-width:500px;
width:90%;
}

h1{
color:#16a34a;
margin-bottom:15px;
}

p{
font-size:18px;
line-height:1.8;
color:#444;
}

#countdown{
font-size:34px;
font-weight:bold;
color:#16a34a;
margin:20px 0;
}

.btn{
display:none;
margin-top:20px;
padding:15px 35px;
background:#16a34a;
color:#fff;
text-decoration:none;
font-size:20px;
border-radius:10px;
font-weight:bold;
}

.btn:hover{
background:#15803d;
}

</style>

</head>

<body>

<div class="card">

<h1>🎉 شكراً لشرائك الكتاب</h1>

<p>
تم استلام عملية الشراء بنجاح.
</p>

<p>
سيبدأ تحميل الكتاب تلقائياً خلال:
</p>

<div id="countdown">3</div>

<a
id="downloadBtn"
class="btn"
href="https://drive.google.com/uc?export=download&id=1DkyuZEnIcGn8hCjbFfZZgjHmpo-9296-">

📥 إذا لم يبدأ التحميل اضغط هنا

</a>

</div>

<script>

let seconds = 3;

let timer = setInterval(function(){

seconds--;

document.getElementById("countdown").innerHTML = seconds;

if(seconds<=0){

clearInterval(timer);

window.location.href= https://naserbooks.github.io/success.html=download&id=1DkyuZEnIcGn8hCjbFfZZgjHmpo-9296-";

setTimeout(function(){

document.getElementById("downloadBtn").style.display="inline-block";

},3000);

}

},1000);

</script>

</body>

</html>
